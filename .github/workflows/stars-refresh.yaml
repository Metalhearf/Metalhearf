name: Stars (refresh metadata)

on:
  schedule:
    - cron: '0 6 1,15 * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: stars
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Refresh repo metadata
        env:
          STARS_TOKEN: ${{ secrets.STARS_TOKEN }}
        run: python .github/scripts/generate_stars.py --mode refresh

      - name: Commit if changed
        run: |
          if git diff --quiet README.md .github/stars_cache.json; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md .github/stars_cache.json
          git commit -m "stars: refresh metadata"
          git push
