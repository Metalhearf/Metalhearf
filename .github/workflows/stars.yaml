name: Update curated stars in README

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 06:00 UTC (~08:00 Europe/Paris)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stars:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate stars block
        env:
          STARS_TOKEN: ${{ secrets.STARS_TOKEN }}
        run: python .github/scripts/generate_stars.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet README.md; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update curated stars (auto)"
          git push
